name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_retrievia
          POSTGRES_USER: retrievia
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: |
          cd backend
          flake8 apps config --max-line-length 100 --extend-ignore E203,W503

      - name: Format check (black)
        run: |
          cd backend
          black --check apps config

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_retrievia
          POSTGRES_USER: retrievia
          POSTGRES_PASSWORD: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          QDRANT_API_KEY: ""
          OPENAI_API_KEY: test
          ANTHROPIC_API_KEY: test
          DJANGO_SECRET_KEY: test-secret-key
          FIELD_ENCRYPTION_KEY: ""
        run: |
          cd backend
          pytest --cov=apps --cov-report=term-missing -q

  frontend-lint-typecheck:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t retrievia-backend:test .

      - name: Build celery image
        run: docker build -f docker/celery.Dockerfile -t retrievia-celery:test .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t retrievia-frontend:test .
